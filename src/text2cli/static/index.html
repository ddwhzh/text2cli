<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>text2cli — Agent Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div id="app">
  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-logo">⬡ text2cli</span>
    <div class="titlebar-workspace">
      <span style="font-size:12px">⎇</span>
      <select id="workspace-select"></select>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn" onclick="app.showNewFileDialog()" title="New File">+ File</button>
      <button class="titlebar-btn" onclick="app.forkWorkspace()" title="Fork Workspace">⑂ Fork</button>
      <button class="titlebar-btn" onclick="app.showDiff()" title="Show Diff">◑ Diff</button>
      <button class="titlebar-btn primary" onclick="app.showCommitDialog()" title="Commit">● Commit</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Explorer</span>
      <div class="sidebar-header-actions">
        <button class="sidebar-icon-btn" onclick="app.refresh()" title="Refresh">↻</button>
      </div>
    </div>
    <div class="file-tree" id="file-tree"></div>

    <div class="sidebar-section">
      <div class="sidebar-section-header" onclick="app.toggleSection('commits')">
        <span>Commits</span>
        <span id="commits-toggle">▾</span>
      </div>
      <div class="commit-list" id="commit-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-header" onclick="app.toggleSection('events')">
        <span>Events</span>
        <span id="events-toggle">▾</span>
      </div>
      <div class="event-list" id="event-list"></div>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-area">
    <div class="editor-tabs" id="editor-tabs"></div>
    <div class="editor-content" id="editor-content"></div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <span>Agent</span>
      <span style="font-size:11px;color:var(--text-muted)" id="chat-status">ready</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-message agent">
        <span class="chat-sender">agent</span>
        <div class="chat-bubble">
          欢迎使用 text2cli 事务工作区.
          输入 <code>/help</code> 查看可用命令, 或直接用自然语言描述你想做的操作.
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="输入命令或自然语言..." rows="1"></textarea>
      <button class="chat-send-btn" id="chat-send" onclick="app.sendChat()">→</button>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-item">
      <span class="status-dot ok"></span>
      <span>workspace: <strong id="status-workspace">main</strong></span>
    </div>
    <div class="status-item" id="status-head"></div>
    <div class="status-item" id="status-files"></div>
    <div class="statusbar-right">
      <span id="status-staged"></span>
      <span id="status-cache"></span>
      <span>SQLite WAL + MVCC</span>
    </div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script src="/app.js"></script>
</body>
</html>
